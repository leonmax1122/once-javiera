<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reto Final - Tabla del Torneo (CSS Básico)</title>
    
    <style>
       
        table {
            width: 100%;            
            border-collapse: collapse;
            font-family: Arial, Helvetica, sans-serif;
            margin-top: 20px;       
        }

        
        th, td {
            border: 1px solid #c0c0c0;
            padding: 12px;
            text-align: center;
        }

        
        thead {
            background-color: #34495e;
            color: white;
        }
        
        .columna-region {
            width: 150px;
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th colspan="6">RETO FINAL — SISTEMA DE TORNEOS CON TABLA COMPLEJA</th>
            </tr>
            <tr>
                <th class="columna-region">Región</th>
                <th>Equipo</th>
                <th>J</th>
                <th>G</th>
                <th>P</th>
                <th>Puntos</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td rowspan="2">Región Norte</td>
                <td>Equipo Alpha</td>
                <td>5</td>
                <td>4</td>
                <td>1</td>
                <td>980 pts</td>
            </tr>
            <tr>
                <td>Equipo Beta</td>
                <td>5</td>
                <td>3</td>
                <td>2</td>
                <td>870 pts</td>
            </tr>

            <tr>
                <td rowspan="2">Región Sur</td>
                <td>Equipo Gamma</td>
                <td>5</td>
                <td>4</td>
                <td>1</td>
                <td>920 pts</td>
            </tr>
            <tr>
                <td>Equipo Delta</td>
                <td>5</td>
                <td>2</td>
                <td>3</td>
                <td>750 pts</td>
            </tr>
        </tbody>

        <tfoot>
            <tr style="background-color: #f2f2f2; font-weight: bold;">
                <td colspan="2">Campeón: Equipo Alpha</td>
                <td colspan="4">Total Participantes: 4 Equipos</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
